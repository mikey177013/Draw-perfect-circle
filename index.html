<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Draw a perfect circle. Get scored on precision." />
  <title>Perfect Circle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='none' stroke='white' stroke-width='6'/%3E%3C/svg%3E" />
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="hint" id="hint">
    <span>Draw a perfect circle</span>
  </div>

  <div class="result" id="result" aria-hidden="true">
    <div class="score" id="score">0.0</div>
    <div class="score-label">accuracy</div>
    <button class="retry" id="retry" type="button" aria-label="Try again">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 12a9 9 0 1 0 3-6.7" />
        <path d="M3 4v5h5" />
      </svg>
      <span>Try again</span>
    </button>
  </div>

  <div class="best" id="best" aria-live="polite">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="9" />
      <circle cx="12" cy="12" r="3" />
    </svg>
    <span>Best <em id="best-value">—</em></span>
  </div>

  <a class="credit" href="https://github.com" target="_blank" rel="noopener noreferrer" aria-label="Source">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M9 19c-4.3 1.4-4.3-2.5-6-3" />
      <path d="M15 22v-3.9a3.4 3.4 0 0 0-.9-2.5c3 -.3 6.2-1.5 6.2-6.7A5.2 5.2 0 0 0 18.9 5a4.9 4.9 0 0 0-.1-3.7s-1.1-.3-3.6 1.4a12.4 12.4 0 0 0-6.4 0C6.3 1 5.2 1.3 5.2 1.3A4.9 4.9 0 0 0 5.1 5 5.2 5.2 0 0 0 3.7 8.9c0 5.2 3.2 6.4 6.2 6.7A3.4 3.4 0 0 0 9 18v4" />
    </svg>
  </a>

  <script src="script.js"></script>
</body>
</html>
